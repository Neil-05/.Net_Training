<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMLHttpRequest Todo Fetch</title>
</head>
<body>
    <h1>Fetch Todos from DummyJSON</h1>
    <button onclick="fetchTodos()">Fetch Todos</button>
    <pre id="output"></pre>

    <script>
        function fetchTodos() {
            const xhr = new XMLHttpRequest();
            
            xhr.open('GET', 'https://dummyjson.com/todos', true);
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    const jsonString = JSON.stringify(data, null, 2);
                    document.getElementById('output').textContent = jsonString;
                } else {
                    document.getElementById('output').textContent = 'Error: ' + xhr.status;
                }
            };
            
            xhr.onerror = function() {
                document.getElementById('output').textContent = 'Request failed';
            };
            
            xhr.send();
        }
    </script>
</body>
</html>
